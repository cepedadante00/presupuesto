<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Presupuesto"/>
<title>Mi Presupuesto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0f;color:#f1f0ff;font-family:'DM Sans',sans-serif;min-height:100svh;}
input,select,button{font-family:'DM Sans',sans-serif;}
input[type=date]{color-scheme:dark;}
.app{max-width:430px;margin:0 auto;display:flex;flex-direction:column;min-height:100svh;}
.header{padding:52px 24px 20px;background:linear-gradient(180deg,#13101e,#0a0a0f);}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.month-row{display:flex;align-items:center;gap:12px;margin-top:4px;}
.label{font-size:12px;color:#6b6880;letter-spacing:2px;text-transform:uppercase;}
.month-title{font-size:22px;font-family:'Space Grotesk',sans-serif;font-weight:700;}
.btn-nav{background:none;border:none;color:#7c6af7;font-size:22px;cursor:pointer;padding:0 4px;}
.btn-add{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#7c6af7,#9f8fff);border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #7c6af740;line-height:1;}
.card{margin:0 20px 20px;padding:24px;background:linear-gradient(135deg,#1a1630,#12102a);border-radius:24px;border:1px solid #2a2545;box-shadow:0 8px 40px #00000060;}
.balance-amt{font-size:36px;font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-1px;margin:4px 0 20px;}
.mini-cards{display:flex;gap:12px;}
.mini-card{flex:1;background:#ffffff08;border-radius:14px;padding:12px 14px;}
.mini-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.mini-val{font-size:16px;font-weight:600;}
.tabs{display:flex;margin:0 20px 20px;background:#13101e;border-radius:14px;padding:4px;gap:4px;}
.tab-btn{flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;background:transparent;color:#6b6880;}
.tab-btn.active{background:linear-gradient(135deg,#7c6af7,#9f8fff);color:#fff;box-shadow:0 2px 12px #7c6af740;}
.content{flex:1;padding:0 20px 30px;}
.section-title{font-size:13px;color:#6b6880;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.tx-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#13101e;border-radius:16px;margin-bottom:8px;border:1px solid #1e1a30;}
.tx-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tx-info{margin-left:12px;}
.tx-cat{font-size:14px;font-weight:600;}
.tx-sub{font-size:11px;color:#6b6880;margin-top:2px;}
.tx-amt{font-size:15px;font-weight:700;}
.btn-del{background:none;border:none;color:#3d3858;cursor:pointer;font-size:20px;padding:0 0 0 8px;line-height:1;}
.empty{text-align:center;padding:40px 0;color:#3d3858;}
.empty-icon{font-size:40px;margin-bottom:8px;}
.empty-text{font-size:14px;}
.empty-sub{font-size:12px;margin-top:4px;}
/* Form */
.type-toggle{display:flex;background:#13101e;border-radius:14px;padding:4px;gap:4px;margin-bottom:16px;}
.type-btn{flex:1;padding:12px 0;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#6b6880;transition:all .2s;}
.type-btn.inc.active{background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff;}
.type-btn.exp.active{background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;}
.field-label{font-size:11px;color:#6b6880;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.field{width:100%;padding:14px 16px;background:#13101e;border:1px solid #2a2545;border-radius:14px;color:#f1f0ff;font-size:14px;outline:none;margin-bottom:12px;appearance:none;}
.field-big{font-size:20px;font-weight:700;font-family:'Space Grotesk',sans-serif;}
.btn-save{width:100%;padding:16px;background:linear-gradient(135deg,#7c6af7,#9f8fff);border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px #7c6af750;margin-bottom:8px;}
.btn-cancel{width:100%;padding:14px;background:none;border:none;color:#6b6880;font-size:14px;cursor:pointer;}
/* Charts */
.chart-box{background:#13101e;border-radius:20px;padding:20px;border:1px solid #1e1a30;margin-bottom:16px;}
.pie-wrap{display:flex;justify-content:center;margin-bottom:16px;}
.pie-svg{width:180px;height:180px;}
.legend{display:flex;flex-wrap:wrap;gap:8px;}
.legend-item{display:flex;align-items:center;gap:6px;background:#13101e;border-radius:20px;padding:6px 12px;border:1px solid #1e1a30;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-name{font-size:11px;color:#c4c0d8;}
.legend-val{font-size:11px;font-weight:700;}
.bar-group{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:11px;color:#6b6880;width:28px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:20px;background:#1e1a30;border-radius:10px;overflow:hidden;display:flex;gap:2px;}
.bar-fill{height:100%;border-radius:10px;transition:width .4s;}
.bar-val{font-size:10px;color:#6b6880;width:50px;text-align:right;flex-shrink:0;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CATS={income:["Salario","Freelance","Inversiones","Regalo","Otro ingreso"],expense:["Comida","Transporte","Hogar","Salud","Entretenimiento","Ropa","Educación","Otro gasto"]};
const COLORS={"Salario":"#4ade80","Freelance":"#34d399","Inversiones":"#2dd4bf","Regalo":"#a3e635","Otro ingreso":"#86efac","Comida":"#f87171","Transporte":"#fb923c","Hogar":"#fbbf24","Salud":"#e879f9","Entretenimiento":"#60a5fa","Ropa":"#f472b6","Educación":"#818cf8","Otro gasto":"#94a3b8"};
const KEY="budget-v2";

function fmt(n){return new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(n);}
function load(){try{return JSON.parse(localStorage.getItem(KEY)||"[]");}catch{return[];}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

let state={
  tab:"home", txs:load(), showForm:false,
  form:{type:"expense",amount:"",category:"Comida",note:"",date:new Date().toISOString().slice(0,10)},
  month:new Date().getMonth(), year:new Date().getFullYear()
};

function setState(patch){Object.assign(state,patch);render();}

function filtered(){
  return state.txs.filter(t=>{const d=new Date(t.date+"T12:00:00");return d.getMonth()===state.month&&d.getFullYear()===state.year;});
}

function render(){
  const f=filtered();
  const income=f.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=f.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance=income-expense;
  const expByCat=CATS.expense.map(c=>({name:c,val:f.filter(t=>t.type==="expense"&&t.category===c).reduce((s,t)=>s+t.amount,0)})).filter(d=>d.val>0);
  const maxExp=Math.max(...expByCat.map(d=>d.val),1);

  const last6=Array.from({length:6},(_,i)=>{
    const d=new Date(state.year,state.month-5+i,1);
    const m=d.getMonth(),y=d.getFullYear();
    const txs=state.txs.filter(t=>{const td=new Date(t.date+"T12:00:00");return td.getMonth()===m&&td.getFullYear()===y;});
    return{name:MONTHS[m],inc:txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),exp:txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0)};
  });
  const maxBar=Math.max(...last6.map(d=>Math.max(d.inc,d.exp)),1);

  // Pie chart SVG
  function makePie(){
    if(!expByCat.length)return'<div class="empty"><div class="empty-icon">📊</div><p class="empty-text">Sin gastos este mes</p></div>';
    const total=expByCat.reduce((s,d)=>s+d.val,0);
    let angle=-Math.PI/2;
    const cx=90,cy=90,r=70,ri=44;
    let paths='';
    expByCat.forEach(d=>{
      const a=(d.val/total)*Math.PI*2;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
      const xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle);
      const xi2=cx+ri*Math.cos(angle+a),yi2=cy+ri*Math.sin(angle+a);
      const lg=a>Math.PI?1:0;
      paths+=`<path d="M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1}" fill="${COLORS[d.name]||'#7c6af7'}" opacity="0.9"/>`;
      angle+=a;
    });
    return`<div class="pie-wrap"><svg class="pie-svg" viewBox="0 0 180 180">${paths}</svg></div>`;
  }

  const html=`
  <div class="header">
    <div class="header-row">
      <div>
        <div class="label">Mi Presupuesto</div>
        <div class="month-row">
          <button class="btn-nav" onclick="changeMonth(-1)">‹</button>
          <span class="month-title">${MONTHS[state.month]} ${state.year}</span>
          <button class="btn-nav" onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <button class="btn-add" onclick="openForm()">+</button>
    </div>
  </div>

  <div class="card">
    <div class="label">Balance</div>
    <div class="balance-amt" style="color:${balance>=0?'#7fffb8':'#ff7070'}">${fmt(balance)}</div>
    <div class="mini-cards">
      <div class="mini-card">
        <div class="mini-label" style="color:#4ade80">↑ Ingresos</div>
        <div class="mini-val">${fmt(income)}</div>
      </div>
      <div class="mini-card">
        <div class="mini-label" style="color:#f87171">↓ Gastos</div>
        <div class="mini-val">${fmt(expense)}</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn ${state.tab==='home'?'active':''}" onclick="setTab('home')">🏠 Inicio</button>
    <button class="tab-btn ${state.tab==='charts'?'active':''}" onclick="setTab('charts')">📊 Gráficas</button>
    <button class="tab-btn ${state.tab==='list'?'active':''}" onclick="setTab('list')">📋 Lista</button>
  </div>

  <div class="content">
  ${state.tab==='home'?`
    <div class="section-title">Últimos movimientos</div>
    ${f.length===0?`<div class="empty"><div class="empty-icon">💸</div><p class="empty-text">Sin movimientos este mes</p><p class="empty-sub">Toca + para agregar uno</p></div>`:''}
    ${f.slice(0,15).map(t=>`
      <div class="tx-row">
        <div style="display:flex;align-items:center">
          <div class="tx-icon" style="background:${t.type==='income'?'#4ade8020':'#f8717120'}">${t.type==='income'?'↑':'↓'}</div>
          <div class="tx-info">
            <div class="tx-cat">${t.category}</div>
            <div class="tx-sub">${t.note||t.date}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="tx-amt" style="color:${t.type==='income'?'#4ade80':'#f87171'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
          <button class="btn-del" onclick="deleteTx(${t.id})">×</button>
        </div>
      </div>
    `).join('')}
  `:''}
  ${state.tab==='charts'?`
    <div class="section-title">Gastos por categoría</div>
    <div class="chart-box">
      ${makePie()}
      <div class="legend">
        ${expByCat.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[d.name]||'#7c6af7'}"></div><span class="legend-name">${d.name}</span><span class="legend-val">${fmt(d.val)}</span></div>`).join('')}
      </div>
    </div>
    <div class="section-title">Últimos 6 meses</div>
    <div class="chart-box">
      <div style="display:flex;gap:12px;margin-bottom:12px;font-size:11px;">
        <span style="display:flex;align-items:center;gap:4px;color:#c4c0d8"><span style="width:10px;height:10px;border-radius:3px;background:#4ade80;display:inline-block"></span>Ingresos</span>
        <span style="display:flex;align-items:center;gap:4px;color:#c4c0d8"><span style="width:10px;height:10px;border-radius:3px;background:#f87171;display:inline-block"></span>Gastos</span>
      </div>
      <div class="bar-group">
        ${last6.map(d=>`
          <div class="bar-row">
            <div class="bar-label">${d.name}</div>
            <div style="flex:1;display:flex;flex-direction:column;gap:3px;">
              <div class="bar-track"><div class="bar-fill" style="width:${(d.inc/maxBar*100).toFixed(1)}%;background:#4ade80;min-width:${d.inc>0?4:0}px"></div></div>
              <div class="bar-track"><div class="bar-fill" style="width:${(d.exp/maxBar*100).toFixed(1)}%;background:#f87171;min-width:${d.exp>0?4:0}px"></div></div>
            </div>
            <div style="font-size:10px;color:#6b6880;width:56px;text-align:right;flex-shrink:0">${d.inc>0||d.exp>0?fmt(d.inc>d.exp?d.inc:d.exp):''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `:''}
  ${state.tab==='list'?`
    <div class="section-title">Todos los movimientos</div>
    ${f.length===0?`<div class="empty"><p class="empty-text">Sin movimientos este mes</p></div>`:''}
    ${f.map(t=>`
      <div class="tx-row">
        <div style="display:flex;align-items:center">
          <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[t.category]||'#7c6af7'};flex-shrink:0"></div>
          <div class="tx-info">
            <div class="tx-cat" style="font-size:13px">${t.category}</div>
            <div class="tx-sub">${t.date}${t.note?' · '+t.note:''}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="tx-amt" style="color:${t.type==='income'?'#4ade80':'#f87171'};font-size:14px">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
          <button class="btn-del" onclick="deleteTx(${t.id})">×</button>
        </div>
      </div>
    `).join('')}
  `:''}
  ${state.tab==='add'&&state.showForm?`
    <div class="section-title">Nuevo movimiento</div>
    <div class="type-toggle">
      <button class="type-btn exp ${state.form.type==='expense'?'active':''}" onclick="setType('expense')">↓ Gasto</button>
      <button class="type-btn inc ${state.form.type==='income'?'active':''}" onclick="setType('income')">↑ Ingreso</button>
    </div>
    <div class="field-label">Monto</div>
    <input class="field field-big" type="number" placeholder="0.00" value="${state.form.amount}" oninput="setField('amount',this.value)" inputmode="decimal"/>
    <div class="field-label">Categoría</div>
    <select class="field" onchange="setField('category',this.value)">
      ${CATS[state.form.type].map(c=>`<option value="${c}" ${state.form.category===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <div class="field-label">Fecha</div>
    <input class="field" type="date" value="${state.form.date}" onchange="setField('date',this.value)"/>
    <div class="field-label">Nota (opcional)</div>
    <input class="field" type="text" placeholder="Descripción..." value="${state.form.note}" oninput="setField('note',this.value)"/>
    <button class="btn-save" onclick="addTx()">Guardar</button>
    <button class="btn-cancel" onclick="cancelForm()">Cancelar</button>
  `:''}
  </div>`;

  document.getElementById('app').innerHTML=html;
}

function setTab(t){setState({tab:t});}
function changeMonth(d){let m=state.month+d,y=state.year;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setState({month:m,year:y});}
function openForm(){setState({tab:'add',showForm:true});}
function cancelForm(){setState({tab:'home',showForm:false});}
function setType(type){setState({form:{...state.form,type,category:type==='income'?'Salario':'Comida'}});}
function setField(k,v){setState({form:{...state.form,[k]:v}});}
function addTx(){
  if(!state.form.amount||isNaN(parseFloat(state.form.amount)))return;
  const tx={id:Date.now(),...state.form,amount:parseFloat(state.form.amount)};
  const txs=[tx,...state.txs];
  save(txs);
  setState({txs,tab:'home',showForm:false,form:{type:'expense',amount:'',category:'Comida',note:'',date:new Date().toISOString().slice(0,10)}});
}
function deleteTx(id){
  const txs=state.txs.filter(t=>t.id!==id);
  save(txs);
  setState({txs});
}

render();
</script>
</body>
</html>
