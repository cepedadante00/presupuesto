<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Presupuesto"/>
  <title>Mi Presupuesto</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;background:#0a0a0f;font-family:'DM Sans',sans-serif;color:#f1f0ff;}
    input,select,button{font-family:'DM Sans',sans-serif;}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback } = React;
const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

const STORAGE_KEY = "budget-app-v1";
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CATEGORIES = {
  income: ["Salario","Freelance","Inversiones","Regalo","Otro ingreso"],
  expense: ["Comida","Transporte","Hogar","Salud","Entretenimiento","Ropa","Educación","Otro gasto"]
};
const CAT_COLORS = {
  "Salario":"#4ade80","Freelance":"#34d399","Inversiones":"#2dd4bf","Regalo":"#a3e635","Otro ingreso":"#86efac",
  "Comida":"#f87171","Transporte":"#fb923c","Hogar":"#fbbf24","Salud":"#e879f9","Entretenimiento":"#60a5fa",
  "Ropa":"#f472b6","Educación":"#818cf8","Otro gasto":"#94a3b8"
};

function fmt(n){return new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(n);}
function load(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):[]}catch{return[];}}
function save(t){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(t));}catch(e){}}

function App(){
  const [tab,setTab]=useState("home");
  const [transactions,setTransactions]=useState(()=>load());
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({type:"expense",amount:"",category:"Comida",note:"",date:new Date().toISOString().slice(0,10)});
  const [filterMonth,setFilterMonth]=useState(new Date().getMonth());
  const [filterYear,setFilterYear]=useState(new Date().getFullYear());

  useEffect(()=>{save(transactions);},[transactions]);

  const addTransaction=useCallback(()=>{
    if(!form.amount||isNaN(parseFloat(form.amount)))return;
    const tx={id:Date.now(),...form,amount:parseFloat(form.amount)};
    setTransactions(prev=>[tx,...prev]);
    setShowForm(false);
    setForm({type:"expense",amount:"",category:"Comida",note:"",date:new Date().toISOString().slice(0,10)});
    setTab("home");
  },[form]);

  const deleteTx=useCallback((id)=>{setTransactions(prev=>prev.filter(t=>t.id!==id));},[]);

  const filtered=transactions.filter(t=>{const d=new Date(t.date+"T12:00:00");return d.getMonth()===filterMonth&&d.getFullYear()===filterYear;});
  const income=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance=income-expense;

  const expByCat=CATEGORIES.expense.map(cat=>({name:cat,value:filtered.filter(t=>t.type==="expense"&&t.category===cat).reduce((s,t)=>s+t.amount,0)})).filter(d=>d.value>0);

  const last6=Array.from({length:6},(_,i)=>{
    const d=new Date(filterYear,filterMonth-5+i,1);
    const m=d.getMonth(),y=d.getFullYear();
    const txs=transactions.filter(t=>{const td=new Date(t.date+"T12:00:00");return td.getMonth()===m&&td.getFullYear()===y;});
    return{name:MONTHS[m],Ingresos:txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),Gastos:txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0)};
  });

  const changeMonth=(dir)=>{let m=filterMonth+dir,y=filterYear;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setFilterMonth(m);setFilterYear(y);};

  const s={
    app:{minHeight:"100svh",background:"#0a0a0f",color:"#f1f0ff",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"},
    header:{padding:"52px 24px 20px",background:"linear-gradient(180deg,#13101e 0%,#0a0a0f 100%)"},
    card:{margin:"0 20px 20px",padding:"24px",background:"linear-gradient(135deg,#1a1630,#12102a)",borderRadius:24,border:"1px solid #2a2545",boxShadow:"0 8px 40px #00000060"},
    tabs:{display:"flex",margin:"0 20px 20px",background:"#13101e",borderRadius:14,padding:4,gap:4},
    content:{flex:1,padding:"0 20px",paddingBottom:30},
    row:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:"#13101e",borderRadius:16,marginBottom:8,border:"1px solid #1e1a30"},
    input:{width:"100%",padding:"14px 16px",background:"#13101e",border:"1px solid #2a2545",borderRadius:14,color:"#f1f0ff",fontSize:14,outline:"none"},
  };

  return React.createElement("div",{style:s.app},
    // Header
    React.createElement("div",{style:s.header},
      React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        React.createElement("div",null,
          React.createElement("p",{style:{margin:0,fontSize:12,color:"#6b6880",letterSpacing:2,textTransform:"uppercase"}},"Mi Presupuesto"),
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12,marginTop:4}},
            React.createElement("button",{onClick:()=>changeMonth(-1),style:{background:"none",border:"none",color:"#7c6af7",fontSize:22,cursor:"pointer",padding:0}},"‹"),
            React.createElement("h1",{style:{margin:0,fontSize:22,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700}},MONTHS[filterMonth]+" "+filterYear),
            React.createElement("button",{onClick:()=>changeMonth(1),style:{background:"none",border:"none",color:"#7c6af7",fontSize:22,cursor:"pointer",padding:0}},"›")
          )
        ),
        React.createElement("button",{onClick:()=>{setShowForm(true);setTab("add");},style:{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#7c6af7,#9f8fff)",border:"none",color:"#fff",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px #7c6af740"}},"+")
      )
    ),
    // Balance card
    React.createElement("div",{style:s.card},
      React.createElement("p",{style:{margin:"0 0 4px",fontSize:12,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Balance"),
      React.createElement("p",{style:{margin:"0 0 20px",fontSize:36,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:balance>=0?"#7fffb8":"#ff7070",letterSpacing:-1}},fmt(balance)),
      React.createElement("div",{style:{display:"flex",gap:12}},
        React.createElement("div",{style:{flex:1,background:"#ffffff08",borderRadius:14,padding:"12px 14px"}},
          React.createElement("p",{style:{margin:"0 0 2px",fontSize:11,color:"#4ade80",letterSpacing:1,textTransform:"uppercase"}},"↑ Ingresos"),
          React.createElement("p",{style:{margin:0,fontSize:16,fontWeight:600}},fmt(income))
        ),
        React.createElement("div",{style:{flex:1,background:"#ffffff08",borderRadius:14,padding:"12px 14px"}},
          React.createElement("p",{style:{margin:"0 0 2px",fontSize:11,color:"#f87171",letterSpacing:1,textTransform:"uppercase"}},"↓ Gastos"),
          React.createElement("p",{style:{margin:0,fontSize:16,fontWeight:600}},fmt(expense))
        )
      )
    ),
    // Tabs
    React.createElement("div",{style:s.tabs},
      ["home","charts","list"].map(t=>
        React.createElement("button",{key:t,onClick:()=>setTab(t),style:{flex:1,padding:"10px 0",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:tab===t?"linear-gradient(135deg,#7c6af7,#9f8fff)":"transparent",color:tab===t?"#fff":"#6b6880"}},
          t==="home"?"🏠 Inicio":t==="charts"?"📊 Gráficas":"📋 Lista"
        )
      )
    ),
    // Content
    React.createElement("div",{style:s.content},
      // HOME
      tab==="home"&&React.createElement("div",null,
        React.createElement("p",{style:{margin:"0 0 12px",fontSize:13,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Últimos movimientos"),
        filtered.length===0&&React.createElement("div",{style:{textAlign:"center",padding:"40px 0",color:"#3d3858"}},
          React.createElement("div",{style:{fontSize:40,marginBottom:8}},"💸"),
          React.createElement("p",{style:{margin:0,fontSize:14}},"Sin movimientos este mes"),
          React.createElement("p",{style:{margin:"4px 0 0",fontSize:12}},"Toca + para agregar uno")
        ),
        filtered.slice(0,15).map(t=>
          React.createElement("div",{key:t.id,style:s.row},
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12}},
              React.createElement("div",{style:{width:38,height:38,borderRadius:12,background:t.type==="income"?"#4ade8020":"#f8717120",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},t.type==="income"?"↑":"↓"),
              React.createElement("div",null,
                React.createElement("p",{style:{margin:0,fontSize:14,fontWeight:600}},t.category),
                React.createElement("p",{style:{margin:0,fontSize:11,color:"#6b6880"}},t.note||t.date)
              )
            ),
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
              React.createElement("p",{style:{margin:0,fontSize:15,fontWeight:700,color:t.type==="income"?"#4ade80":"#f87171"}},(t.type==="income"?"+":"-")+fmt(t.amount)),
              React.createElement("button",{onClick:()=>deleteTx(t.id),style:{background:"none",border:"none",color:"#3d3858",cursor:"pointer",fontSize:18,padding:0}},"×")
            )
          )
        )
      ),
      // CHARTS
      tab==="charts"&&React.createElement("div",null,
        React.createElement("p",{style:{margin:"0 0 16px",fontSize:13,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Gastos por categoría"),
        expByCat.length===0?React.createElement("div",{style:{textAlign:"center",padding:"30px 0",color:"#3d3858"}},
          React.createElement("div",{style:{fontSize:36,marginBottom:8}},"📊"),
          React.createElement("p",{style:{margin:0,fontSize:14}},"Sin gastos este mes")
        ):React.createElement("div",null,
          React.createElement("div",{style:{background:"#13101e",borderRadius:20,padding:"20px 0",border:"1px solid #1e1a30",marginBottom:16}},
            React.createElement(ResponsiveContainer,{width:"100%",height:200},
              React.createElement(PieChart,null,
                React.createElement(Pie,{data:expByCat,cx:"50%",cy:"50%",innerRadius:55,outerRadius:85,paddingAngle:3,dataKey:"value"},
                  expByCat.map((e,i)=>React.createElement(Cell,{key:i,fill:CAT_COLORS[e.name]||"#7c6af7"}))
                ),
                React.createElement(Tooltip,{formatter:v=>fmt(v),contentStyle:{background:"#1a1630",border:"1px solid #2a2545",borderRadius:10,color:"#f1f0ff"}})
              )
            )
          ),
          React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}},
            expByCat.map((e,i)=>
              React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:6,background:"#13101e",borderRadius:20,padding:"6px 12px",border:"1px solid #1e1a30"}},
                React.createElement("div",{style:{width:8,height:8,borderRadius:"50%",background:CAT_COLORS[e.name]||"#7c6af7"}}),
                React.createElement("span",{style:{fontSize:11,color:"#c4c0d8"}},e.name),
                React.createElement("span",{style:{fontSize:11,fontWeight:700}},fmt(e.value))
              )
            )
          )
        ),
        React.createElement("p",{style:{margin:"0 0 16px",fontSize:13,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Últimos 6 meses"),
        React.createElement("div",{style:{background:"#13101e",borderRadius:20,padding:"20px 8px",border:"1px solid #1e1a30"}},
          React.createElement(ResponsiveContainer,{width:"100%",height:180},
            React.createElement(BarChart,{data:last6,barGap:4},
              React.createElement(XAxis,{dataKey:"name",tick:{fill:"#6b6880",fontSize:11},axisLine:false,tickLine:false}),
              React.createElement(YAxis,{hide:true}),
              React.createElement(Tooltip,{formatter:v=>fmt(v),contentStyle:{background:"#1a1630",border:"1px solid #2a2545",borderRadius:10,color:"#f1f0ff"}}),
              React.createElement(Bar,{dataKey:"Ingresos",fill:"#4ade80",radius:[6,6,0,0]}),
              React.createElement(Bar,{dataKey:"Gastos",fill:"#f87171",radius:[6,6,0,0]})
            )
          )
        )
      ),
      // LIST
      tab==="list"&&React.createElement("div",null,
        React.createElement("p",{style:{margin:"0 0 12px",fontSize:13,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Todos los movimientos"),
        filtered.length===0&&React.createElement("div",{style:{textAlign:"center",padding:"40px 0",color:"#3d3858"}},React.createElement("p",{style:{margin:0,fontSize:14}},"Sin movimientos este mes")),
        filtered.map(t=>
          React.createElement("div",{key:t.id,style:s.row},
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12}},
              React.createElement("div",{style:{width:10,height:10,borderRadius:"50%",background:CAT_COLORS[t.category]||"#7c6af7",flexShrink:0}}),
              React.createElement("div",null,
                React.createElement("p",{style:{margin:0,fontSize:13,fontWeight:600}},t.category),
                React.createElement("p",{style:{margin:0,fontSize:11,color:"#6b6880"}},t.date+(t.note?" · "+t.note:""))
              )
            ),
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
              React.createElement("p",{style:{margin:0,fontSize:14,fontWeight:700,color:t.type==="income"?"#4ade80":"#f87171"}},(t.type==="income"?"+":"-")+fmt(t.amount)),
              React.createElement("button",{onClick:()=>deleteTx(t.id),style:{background:"none",border:"none",color:"#3d3858",cursor:"pointer",fontSize:18,padding:0}},"×")
            )
          )
        )
      ),
      // ADD FORM
      tab==="add"&&showForm&&React.createElement("div",null,
        React.createElement("p",{style:{margin:"0 0 16px",fontSize:13,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Nuevo movimiento"),
        React.createElement("div",{style:{display:"flex",background:"#13101e",borderRadius:14,padding:4,gap:4,marginBottom:16}},
          ["expense","income"].map(type=>
            React.createElement("button",{key:type,onClick:()=>setForm(f=>({...f,type,category:type==="income"?"Salario":"Comida"})),style:{flex:1,padding:"12px 0",borderRadius:10,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:form.type===type?(type==="income"?"linear-gradient(135deg,#4ade80,#22c55e)":"linear-gradient(135deg,#f87171,#ef4444)"):"transparent",color:form.type===type?"#fff":"#6b6880"}},
              type==="income"?"↑ Ingreso":"↓ Gasto"
            )
          )
        ),
        React.createElement("p",{style:{margin:"0 0 6px",fontSize:11,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Monto"),
        React.createElement("input",{type:"number",placeholder:"0.00",value:form.amount,onChange:e=>setForm(f=>({...f,amount:e.target.value})),style:{...s.input,fontSize:20,fontWeight:700,fontFamily:"'Space Grotesk',sans-serif",marginBottom:12}}),
        React.createElement("p",{style:{margin:"0 0 6px",fontSize:11,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Categoría"),
        React.createElement("select",{value:form.category,onChange:e=>setForm(f=>({...f,category:e.target.value})),style:{...s.input,appearance:"none",marginBottom:12}},
          CATEGORIES[form.type].map(c=>React.createElement("option",{key:c,value:c},c))
        ),
        React.createElement("p",{style:{margin:"0 0 6px",fontSize:11,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Fecha"),
        React.createElement("input",{type:"date",value:form.date,onChange:e=>setForm(f=>({...f,date:e.target.value})),style:{...s.input,colorScheme:"dark",marginBottom:12}}),
        React.createElement("p",{style:{margin:"0 0 6px",fontSize:11,color:"#6b6880",letterSpacing:1,textTransform:"uppercase"}},"Nota (opcional)"),
        React.createElement("input",{type:"text",placeholder:"Descripción...",value:form.note,onChange:e=>setForm(f=>({...f,note:e.target.value})),style:{...s.input,marginBottom:20}}),
        React.createElement("button",{onClick:addTransaction,style:{width:"100%",padding:"16px 0",background:"linear-gradient(135deg,#7c6af7,#9f8fff)",border:"none",borderRadius:16,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px #7c6af750"}},"Guardar"),
        React.createElement("button",{onClick:()=>{setShowForm(false);setTab("home");},style:{width:"100%",padding:"14px 0",background:"none",border:"none",color:"#6b6880",fontSize:14,cursor:"pointer",marginTop:8}},"Cancelar")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
